name: VC Sourcing Pipeline

on:
  schedule:
    - cron: '30 2 * * *'   # 2:30 AM UTC = 8 AM IST daily
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write        # needed to commit data.json back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MIN_SCORE_THRESHOLD: "30"
        run: python scripts/run_pipeline.py

      - name: Commit updated data.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/data.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: pipeline run $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]" && git push)

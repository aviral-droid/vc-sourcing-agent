name: VC Sourcing Pipeline

on:
  schedule:
    - cron: '30 2 * * *'   # 2:30 AM UTC = 8 AM IST daily
  workflow_dispatch:         # manual trigger from GitHub UI

# Never let two pipeline runs overlap — they both commit data.json/state and
# would race each other into rebase conflicts. Queue instead of cancel.
concurrency:
  group: vc-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write        # needed to commit data.json back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          MIN_SCORE_THRESHOLD: "40"   # raised from 30: rule-based floor is ~30, which let noise through
        run: python scripts/run_pipeline.py

      - name: Commit updated data.json + state
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/data.json state/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: pipeline run $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          # If main moved during the run (a manual push landed mid-run), the
          # generated JSON files can't auto-merge. Resolve by preferring this
          # run's freshly generated output ('theirs' during rebase = our
          # commit being replayed) — the next run regenerates from the merged
          # code anyway, so this is always eventually consistent.
          if ! git pull --rebase origin main; then
            git checkout --theirs docs/data.json state/ || true
            git add docs/data.json state/
            GIT_EDITOR=true git rebase --continue
          fi
          git push
